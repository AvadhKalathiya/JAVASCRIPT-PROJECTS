<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Typing Master</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <h1>⌨️ Typing Master</h1>

  <!-- Typing Text -->
  <div class="typing-box">
      <p class="typing-text"></p>
  </div>

  <!-- Hidden Input -->
  <input type="text" class="input-field" autofocus>

  <!-- Stats -->
  <div class="stats">
      <div>⏱ Time: <span class="time">60</span>s</div>
      <div>❌ Mistakes: <span class="mistake">0</span></div>
      <div>⚡ WPM: <span class="wpm">0</span></div>
      <div>🔥 CPM: <span class="cpm">0</span></div>
  </div>

  <button class="restart">Restart</button>

</div>

<script src="script.js"></script>
</body>
</html>
